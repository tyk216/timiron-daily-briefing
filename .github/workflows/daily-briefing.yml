name: Timiron Daily Briefing

on:
  # Scheduled trigger DISABLED 2026-04-05 — migrated to VPS (systemd timer on Hetzner).
  # Kept as manual fallback only. See /opt/briefing on 178.156.254.183.
  workflow_dispatch:

jobs:
  briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily briefing
        env:
          MS_GRAPH_REFRESH_TOKEN: ${{ secrets.MS_GRAPH_REFRESH_TOKEN }}
          MS_GRAPH_CLIENT_ID: ${{ secrets.MS_GRAPH_CLIENT_ID }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}
          RECIPIENTS: ${{ secrets.RECIPIENTS }}
          QBT_TOKEN: ${{ secrets.QBT_TOKEN }}
        run: python timiron_cloud_briefing.py
