name: Update Dashboard Data

on:
  schedule:
    # Every 30 min, 5 AM - 11 PM UTC (midnight - 6 PM ET during EDT)
    - cron: '*/30 10-23 * * *'
    - cron: '*/30 0-3 * * *'
  workflow_dispatch:  # On-demand refresh via API or manual trigger

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate dashboard JSON
        env:
          MS_GRAPH_REFRESH_TOKEN: ${{ secrets.MS_GRAPH_REFRESH_TOKEN }}
          MS_GRAPH_CLIENT_ID: ${{ secrets.MS_GRAPH_CLIENT_ID }}
        run: python generate_dashboard_json.py > /tmp/dashboard.json

      - name: Deploy to gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin gh-pages || git checkout --orphan gh-pages
          git checkout gh-pages
          mkdir -p data
          cp /tmp/dashboard.json data/dashboard.json
          git add data/dashboard.json
          git diff --cached --quiet || git commit -m "Update dashboard data $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push origin gh-pages
