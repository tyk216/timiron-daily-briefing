name: Update Dashboard Data

on:
  schedule:
    # Every 30 min, 5 AM - 11 PM UTC (midnight - 6 PM ET during EDT)
    - cron: '*/30 10-23 * * *'
    - cron: '*/30 0-3 * * *'
  workflow_dispatch:  # On-demand refresh via API or manual trigger

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate dashboard JSON
        env:
          MS_GRAPH_REFRESH_TOKEN: ${{ secrets.MS_GRAPH_REFRESH_TOKEN }}
          MS_GRAPH_CLIENT_ID: ${{ secrets.MS_GRAPH_CLIENT_ID }}
        run: python generate_dashboard_json.py pwa/data/dashboard.json

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy pwa --project-name cadiz-ops --commit-dirty=true
