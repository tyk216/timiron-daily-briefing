# ═══════════════════════════════════════════════════════════════════
# Timiron Daily Briefing — Configuration
# Edit this file to update monthly costs, thresholds, and settings
# without touching the Python code.
# ═══════════════════════════════════════════════════════════════════

# ── Terminal Info ──────────────────────────────────────────────────
terminal:
  name: "Cadiz Terminal"
  location: "Cadiz, OH"
  company: "Timiron Midstream Partners"

# ── OneDrive / SharePoint ─────────────────────────────────────────
# The load log is read directly from Cadiz Ops OneDrive via Graph API
onedrive:
  # cadiz_ops user's OneDrive drive — use Graph API /users/{user}/drive
  cadiz_ops_user: "cadiz_ops@timirontrading.com"
  # Path within their OneDrive to the load log folder
  load_log_folder: "/Timiron Cadiz Ops"
  # Filename pattern (glob-style) — picks most recently modified match
  load_log_pattern: "MASTER COPY - FEB MASTER LOAD LOG"

# ── Operational Constants ─────────────────────────────────────────
operations:
  rail_cap_daily_bbls: 15000          # daily rail ceiling (bbls)
  pump_available_hrs: 21              # hrs/pump/day (24 - 3hr rail switch)
  pumps:
    - name: "P-101"
      bol_prefix: "111"
    - name: "P-102"
      bol_prefix: "222"
    - name: "P-103"
      bol_prefix: "333"

# ── Carriers ──────────────────────────────────────────────────────
carriers:
  - name: "Badlands"
    email_search: "from:ohiodispatch subject:UPDATE"
    normalize_from: "Badlands"       # how it appears in load log
  - name: "KAG"
    email_search: "from:bxi-bloomingdale subject:UPDATE"
    normalize_from: "KAG"
  - name: "Prop Logistics"
    email_search: null               # no dedicated email search
    normalize_from: "Prop Logistics"
  - name: "BD Oil"
    email_search: null
    normalize_from: "BD OIL"         # load log uses uppercase
  - name: "1st Choice Energy"
    email_search: null
    normalize_from: "1st Choice Energy"

# ── Monthly Cost Assumptions ──────────────────────────────────────
# Update these at the start of each month
monthly_costs:
  # Format: YYYY-MM: fixed_cost
  "2026-03": 244583.52
  "2026-04": 244583.52               # copy forward until actual is known
  default: 244583.52                  # fallback if month not listed

# ── Prior Month Actuals ───────────────────────────────────────────
# Used for month-over-month comparison. Update after each month closes.
prior_months:
  "2026-02":
    total_bbls: 313600
    avg_bbls_per_day: 11200
    total_trucks: 8970
    avg_trucks_per_day: 57.1
    days: 28
  "2026-01":
    total_bbls: 329633
    avg_bbls_per_day: 10633
    total_trucks: 5139
    avg_trucks_per_day: 165.8
    days: 31

# ── YTD Baseline ──────────────────────────────────────────────────
# Cumulative totals BEFORE the current month (update monthly)
ytd_baseline:
  as_of: "2026-02-28"               # end of last completed month
  total_bbls: 2191314               # 2520947 - 329633 (corrected)
  total_trucks: 11179               # 13218 - 2039

# ── Revenue Formula ───────────────────────────────────────────────
# Tiered throughput pricing
revenue_tiers:
  - up_to_bbls: 5000
    rate: 1.30
  - up_to_bbls: 10000
    rate: 0.95
  - above:
    rate: 0.75

# ── Email Settings ────────────────────────────────────────────────
email:
  # Cadiz ops email search patterns
  rail_swap_search: "from:cadiz.ops subject:RAIL"
  update_search: "from:cadiz.ops subject:UPDATE"
  logs_search: "from:cadiz.ops subject:LOGS"
  # Maintenance keywords to flag
  maintenance_keywords:
    - pump
    - repair
    - replace
    - fix
    - broke
    - leak
    - down
    - out of service
    - maintenance
    - welding
    - valve
    - hose
    - motor
    - pressure
    - gauge

# ── Thresholds / Flags ────────────────────────────────────────────
flags:
  pump_imbalance_threshold_pct: 10   # flag if max-min pump ute > this
  low_bbls_per_hr: 430               # flag pumps below this
  split_normal_pct: 24               # historical avg split %
  soft_day_threshold_pct: 5          # "soft day" if below run rate by this %
  soft_streak_days: 4                # flag if N+ consecutive soft days
  stale_data_hours: 18               # warn if load log older than this
